services:
  # Backing services.
  mysql:
    # Pin the version for mysql_native_password support.
    image: mysql:8.0.20
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_TCP_PORT: ${MYSQL_PORT}
    # This is required for API and hanayo.
    command: mysqld --default-authentication-plugin=mysql_native_password
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    volumes:
      - ${MYSQL_DATA_PATH}:/var/lib/mysql
      - ./mysql/rosu.conf:/etc/mysql/conf.d/rosu.conf:ro
    healthcheck:
      test: "/usr/bin/mysql --user=$$MYSQL_USER --password=$$MYSQL_PASSWORD --execute \"SELECT 1;\""
      interval: 2s
      timeout: 20s
      retries: 10

  redis:
    logging:
      driver: none
    image: redis
    restart: always
    command: "redis-server --port ${REDIS_PORT}"
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - ${REDIS_DATA_PATH}:/data
    healthcheck:
      test: "redis-cli -p ${REDIS_PORT} ping"
      interval: 2s
      timeout: 20s
      retries: 10

  nginx:
    image: rosu-nginx:latest
    restart: always
    ports:
      - "${NGINX_PORT}:80"
    healthcheck:
      test: "curl --fail http://nginx"
      interval: 2s
      timeout: 20s
      retries: 10
    env_file:
      - .env
    volumes:
      - "${DATA_SCREENSHOTS_PATH}:/app/data/screenshots:ro"
      - "${DATA_AVATARS_PATH}:/app/data/avatars:ro"
      - "${DATA_BSS_PATH}/osz:/app/data/osz:ro"
    depends_on:
      peppy:
        condition: service_healthy
      ussr:
        condition: service_healthy
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
      panel:
        condition: service_healthy
      performance-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      beatmaps-service:
        condition: service_healthy
      usa: 
        condition: service_healthy

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "${PHPMYADMIN_PORT}:80"
    healthcheck:
      test: "curl --fail http://phpmyadmin"
      interval: 2s
      timeout: 20s
      retries: 10
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=${MYSQL_PORT}
      - UPLOAD_LIMIT=1G
      - HIDE_PHP_VERSION=true
    depends_on:
      mysql:
        condition: service_healthy

  # Jobs
  migrator:
    image: migrator:latest
    restart: no
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      # So we don't have to rebuild the image per migration.
      - ./migrator/migrations:/app/migrations:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_TCP_PORT=${MYSQL_PORT}
  
  # RealistikOsu Services.
  peppy:
    image: peppy:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: "curl --fail ${PEPPY_INTERNAL_URL}:${PEPPY_PORT}"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${PEPPY_PORT}:${PEPPY_PORT}"
    volumes:
      - "${DATA_MAPS_PATH}:/data/maps"

    environment:
      - HTTP_PORT=${PEPPY_PORT}
      - HTTP_ADDRESS=0.0.0.0
      - HTTP_THREAD_COUNT=${PEPPY_HTTP_THREAD_COUNT}
      - HTTP_USING_CLOUDFLARE=${PS_USING_CLOUDFLARE}
      
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_POOL_SIZE=${PEPPY_MYSQL_POOL_SIZE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}

      - PERFORMANCE_SERVICE_URL=${PERFORMANCE_SERVICE_INTERNAL_URL}:${PERFORMANCE_SERVICE_PORT}
      - USSR_URL=${USSR_INTERNAL_URL}:${USSR_PORT}

      - DISCORD_RANKED_WEBHOOK_URL=${PS_DISCORD_RANKED_WEBHOOK}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - PS_NAME=${PS_SERVER_NAME}
      - PS_DOMAIN=${PS_SERVER_DOMAIN}
      - PS_BOT_USERNAME=${PS_SERVER_BOT_NAME}
      - PS_BOT_USER_ID=${PS_SERVER_BOT_USER_ID}
      - PS_MINIMUM_CLIENT_YEAR=${PEPPY_MINIMUM_CLIENT_YEAR}
      - PS_ENABLE_PY_COMMAND=${PEPPY_PYTHON_COMMAND_ENABLE}
      - PS_PY_COMMAND_WHITELIST=${PEPPY_PYTHON_COMMAND_WHITELIST}

      - DATA_BEATMAP_DIRECTORY=/data/maps
      - IP2LOCATION_API_KEY=${IP2LOCATION_API_KEY}

  ussr:
    image: ussr:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      performance-service:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${USSR_PORT}:${USSR_PORT}"
    healthcheck:
      test: "curl --fail ${USSR_INTERNAL_URL}:${USSR_PORT}/web/bancho-connect.php"
      interval: 2s
      timeout: 20s
      retries: 10
    environment:
      - HTTP_PORT=${USSR_PORT}
      
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}

      - DATA_BEATMAP_DIRECTORY=/data/maps
      - DATA_SCREENSHOT_DIRECTORY=/data/screenshots
      - DATA_REPLAY_DIRECTORY=/data/replays

      - API_KEYS_POOL=${OSU_API_KEY_POOL}
      - API_FALLBACK_URL=${USSR_API_FALLBACK_URL}
      - API_OSU_FALLBACK_URL=${USSR_OSU_FALLBACK_URL}
      - DIRECT_URL=${BEATMAP_MIRROR_API_URL}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - SRV_URL=${PS_SERVER_DOMAIN}
      - SRV_NAME=${PS_SERVER_NAME}
      - SRV_VERIFIED_BADGE=${PS_VERIFIED_BADGE_ID}
      - BOT_USER_ID=${PS_SERVER_BOT_USER_ID}
      - CUSTOM_CLIENTS=${USSR_ALLOW_CUSTOM_CLIENTS}

      - DISCORD_FIRST_PLACE=${PS_DISCORD_FIRST_PLACE_WEBHOOK}
      - DISCORD_ADMIN_HOOK=${PS_DISCORD_ADMIN_WEBHOOK}

      - WS_WRITE_KEY=${USSR_WEBSOCKET_WRITE_KEY}

      - PERFORMANCE_SERVICE_URL=${PERFORMANCE_SERVICE_INTERNAL_URL}:${PERFORMANCE_SERVICE_PORT}
      
      # TODO: we dont use these atm lol.
      - S3_ENABLED=false
      - S3_BUCKET=
      - S3_REGION=
      - S3_ENDPOINT=
      - S3_ACCESS_KEY=
      - S3_SECRET_KEY=

      - MEILI_DIRECT=false
      - MEILI_URL=
      - MEILI_KEY=

    volumes:
      - ${DATA_REPLAYS_PATH}:/data/replays
      - ${DATA_SCREENSHOTS_PATH}:/data/screenshots
      - ${DATA_MAPS_PATH}:/data/maps

  usa:
    image: usa:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: "curl --fail ${USA_INTERNAL_URL}:${USA_PORT}/health"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${USA_PORT}:${USA_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SERVER_PORT=${USA_PORT}
      - DATABASE_HOST=mysql
      - DATABASE_PORT=${MYSQL_PORT}
      - DATABASE_USER=${MYSQL_USER}
      - DATABASE_PASSWORD=${MYSQL_PASSWORD}
      - DATABASE_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - OSU_API_V2_CLIENT_ID=${OSU_CLIENT_ID}
      - OSU_API_V2_CLIENT_SECRET=${OSU_CLIENT_SECRET}

      - PERFORMANCE_SERVICE_BASE_URL=${PERFORMANCE_SERVICE_INTERNAL_URL}:${PERFORMANCE_SERVICE_PORT}
      - BEATMAPS_SERVICE_BASE_URL=${BEATMAPS_SERVICE_INTERNAL_URL}:${BEATMAPS_SERVICE_PORT}
      - BEATMAP_DOWNLOAD_MIRROR_BASE_URL=${BEATMAP_DOWNLOAD_MIRROR_URL}

      - PATH_TO_REPLAYS=/data/replays
      - PATH_TO_SCREENSHOTS=/data/screenshots

      - LOGGER_MIN_LEVEL=3

      - SERVER_BASE_URL=${APP_BASE_URL}
      - SERVER_VERIFIED_BADGE_ID=${PS_VERIFIED_BADGE_ID}

      - ADMIN_WEBHOOK_URL=${PS_DISCORD_ADMIN_WEBHOOK}
    
      - DD_AGENT_HOST=host.docker.internal
    volumes:
      - ${DATA_REPLAYS_PATH}:/data/replays
      - ${DATA_SCREENSHOTS_PATH}:/data/screenshots
  
  api:
    image: api:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: "curl --fail ${API_INTERNAL_URL}:${API_PORT}/api/v1/ping"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${API_PORT}:${API_PORT}"
    environment:
      - APP_COMPONENT=api
      - APP_ENV=production
      - APP_PORT=${API_PORT}

      - HANAYO_KEY=${HANAYO_KEY}
      
      - BEATMAP_REQUESTS_PER_USER=${BEATMAP_REQUESTS_PER_USER}
      - RANK_QUEUE_SIZE=${RANK_QUEUE_SIZE}

      - OSU_API_KEY=${OSU_API_KEY}

      - DB_SCHEME=mysql
      - DB_HOST=mysql
      - DB_PORT=${MYSQL_PORT}
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}

      - DD_AGENT_HOST=host.docker.internal
      - DD_SERVICE=RippleAPI
      - DD_ENV=production
      - DD_LOGS_INJECTION=true
      - DD_VERSION=4.0.0
    
  frontend:
    image: frontend:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: "curl --fail ${FRONTEND_INTERNAL_URL}:${FRONTEND_PORT}/favicon.ico"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - APP_COMPONENT=api
      - APP_ENV=production
      - APP_COOKIE_SECRET=${COOKIE_SECRET}
      - APP_PORT=${FRONTEND_PORT}
      - APP_HANAYO_KEY=${HANAYO_KEY}
      - APP_INTERNAL_AVATARS_PATH=/data/avatars
      - APP_INTERNAL_BANNERS_PATH=/data/banners
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_AVATAR_URL=${APP_AVATAR_URL}
      - APP_API_URL=${APP_API_URL}
      - APP_BANCHO_URL=${APP_BANCHO_URL}

      - BEATMAP_MIRROR_API_URL=${BEATMAP_MIRROR_API_URL}
      - BEATMAP_DOWNLOAD_MIRROR_URL=${BEATMAP_DOWNLOAD_MIRROR_URL}

      - DISCORD_SERVER_URL=${DISCORD_SERVER_URL}
      - DISCORD_APP_CLIENT_ID=${DISCORD_APP_CLIENT_ID}
      - DISCORD_APP_CLIENT_SECRET=${DISCORD_APP_CLIENT_SECRET}
      
      - DB_SCHEME=mysql
      - DB_HOST=mysql
      - DB_PORT=${MYSQL_PORT}
      - DB_USER=${MYSQL_USER}
      - DB_PASS=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      
      - REDIS_MAX_CONNECTIONS=10
      - REDIS_NETWORK_TYPE=tcp
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}
      - REDIS_USE_SSL=false
      
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_PUBLIC_KEY=${MAILGUN_PUBLIC_KEY}
      - MAILGUN_FROM=${MAILGUN_FROM}

      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}

      - IP_LOOKUP_URL=${IP_LOOKUP_URL}
      - DISCORD_USER_LOOKUP_URL=${DISCORD_USER_LOOKUP_URL}

      - PAYPAL_EMAIL_ADDRESS=${PAYPAL_EMAIL_ADDRESS}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}

    volumes:
      - ${DATA_AVATARS_PATH}:/data/avatars
      - ${DATA_BANNERS_PATH}:/data/banners
      # quick trick because im lazy
      - ${DATA_BANNERS_PATH}:/srv/root/static/profbackgrounds:ro

  casino:
    image: casino:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    healthcheck:
      test: "curl --fail ${CASINO_INTERNAL_URL}:${CASINO_PORT}/favicon.ico"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${CASINO_PORT}:${CASINO_PORT}"
    environment:
      - APP_PORT=${CASINO_PORT}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_POOL_SIZE=${PEPPY_MYSQL_POOL_SIZE}
      - SESSION_SECRET=${CASINO_COOKIE_SECRET}
      - NEXT_PUBLIC_APP_NAME=${CASINO_APP_NAME}
      - NEXT_PUBLIC_DOMAIN=${PS_SERVER_DOMAIN}

  panel:
    image: panel:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: "curl --fail ${PANEL_INTERNAL_URL}:${PANEL_PORT}"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${PANEL_PORT}:${PANEL_PORT}"
    environment:
      - USE_ENV_CONFIG=true
      
      - HTTP_PORT=${PANEL_PORT}
      - HTTP_HOST=0.0.0.0
      - SQL_HOST=mysql
      - SQL_PORT=${MYSQL_PORT}
      - SQL_USER=${MYSQL_USER}
      - SQL_PASSWORD=${MYSQL_PASSWORD}
      - SQL_DATABASE=${MYSQL_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_DB=${REDIS_DATABASE}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - SRV_NAME=${PS_SERVER_NAME}
      - SRV_URL=${APP_BASE_URL}/
      - SRV_SUPPORTS_RELAX=true
      - SRV_SUPPORTS_AUTOPILOT=true
      - SRV_DONOR_BADGE=${PS_DONATOR_BADGE_ID}
      - API_USSR_URL=${APP_USSR_URL}/
      - API_AVATAR_URL=${APP_AVATAR_URL}/
      - API_BANCHO_URL=${APP_BANCHO_URL}
      - API_PERFORMANCE_URL=${APP_PERFORMANCE_URL}
      - AVATARS_PATH=/avatars
      - WEBHOOK_RANKED=${PS_DISCORD_RANKED_WEBHOOK}
      - WEBHOOK_ADMIN_LOG=${PS_DISCORD_ADMIN_WEBHOOK}

      - DD_AGENT_HOST=host.docker.internal
      - DD_SERVICE=admin-panel
      - DD_ENV=production
      - DD_LOGS_INJECTION=true
      - DD_VERSION=4.0.0
    volumes:
      - "${DATA_AVATARS_PATH}:/avatars"
  
  performance-service:
    image: performance-service:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    healthcheck:
      test: "curl --fail ${PERFORMANCE_SERVICE_INTERNAL_URL}:${PERFORMANCE_SERVICE_PORT}/api/v1/status"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${PERFORMANCE_SERVICE_PORT}:${PERFORMANCE_SERVICE_PORT}"
    environment:
      - APP_COMPONENT=api
      
      - API_HOST=0.0.0.0
      - API_PORT=${PERFORMANCE_SERVICE_PORT}

      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}

      - REDIS_USER=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - BEATMAPS_PATH=/data/maps

      # Enable any/all prints.
      - RUST_LOG=performance_service=debug

    volumes:
      - ${DATA_MAPS_PATH}:/data/maps

  statistics-service:
    image: statistics-service:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      statistics-service-online-cron:
        condition: service_started
      statistics-service-profile-graphs-cron:
        condition: service_started
      statistics-service-top-scores-cron:
        condition: service_started
    healthcheck:
      test: "curl --fail ${STATISTICS_SERVICE_INTERNAL_URL}:${STATISTICS_SERVICE_PORT}/api/v1/statistics/homepage"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${STATISTICS_SERVICE_PORT}:${STATISTICS_SERVICE_PORT}"
    environment:
      - APP_ENV=production
      - APP_COMPONENT=api
      - APP_HOST=0.0.0.0
      - APP_PORT=${STATISTICS_SERVICE_PORT}
      

      - WRITE_DB_HOST=mysql
      - WRITE_DB_PORT=${MYSQL_PORT}
      - WRITE_DB_USER=${MYSQL_USER}
      - WRITE_DB_PASS=${MYSQL_PASSWORD}
      - WRITE_DB_NAME=${MYSQL_DATABASE}

      - READ_DB_HOST=mysql
      - READ_DB_PORT=${MYSQL_PORT}
      - READ_DB_USER=${MYSQL_USER}
      - READ_DB_PASS=${MYSQL_PASSWORD}
      - READ_DB_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - LOG_LEVEL=10

      - DD_AGENT_HOST=host.docker.internal
      - DD_SERVICE=statistics-service
      - DD_ENV=production
      - DD_LOGS_INJECTION=true
      - DD_VERSION=4.0.0

  soumetsu:
    image: soumetsu:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      soumetsu-api:
        condition: service_started
    ports:
      - "${SOUMETSU_PORT}:${SOUMETSU_PORT}"
    environment:
      - APP_COMPONENT=api
      - SOUMETSU_ENV=production
      - SOUMETSU_PORT=${SOUMETSU_PORT}
      - SOUMETSU_COOKIE_SECRET=${COOKIE_SECRET}
      - SOUMETSU_KEY=${HANAYO_KEY}
      - SOUMETSU_API_URL=${APP_NEW_API_URL}
      - SOUMETSU_BASE_URL=${APP_NEW_BASE_URL}
      - SOUMETSU_AVATAR_URL=${APP_AVATAR_URL}
      # - APP_API_URL=${APP_API_URL}
      - SOUMETSU_BANCHO_URL=${APP_BANCHO_URL}

      - SOUMETSU_BEATMAP_MIRROR_API_URL=${BEATMAP_MIRROR_API_URL}
      - SOUMETSU_BEATMAP_DOWNLOAD_MIRROR_URL=${BEATMAP_DOWNLOAD_MIRROR_URL}

      - DISCORD_SERVER_URL=${DISCORD_SERVER_URL}
      - DISCORD_APP_CLIENT_ID=${DISCORD_APP_CLIENT_ID}
      - DISCORD_APP_CLIENT_SECRET=${DISCORD_APP_CLIENT_SECRET}

      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - MAILGUN_PUBLIC_KEY=${MAILGUN_PUBLIC_KEY}
      - MAILGUN_FROM=${MAILGUN_FROM}

      - RECAPTCHA_SITE_KEY=${RECAPTCHA_SITE_KEY}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}

      - IP_LOOKUP_URL=${IP_LOOKUP_URL}
      - DISCORD_USER_LOOKUP_URL=${DISCORD_USER_LOOKUP_URL}

      - PAYPAL_EMAIL_ADDRESS=${PAYPAL_EMAIL_ADDRESS}

      # Database
      - MYSQL_HOST=mysql
      - MYSQL_TCP_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}

      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DATABASE}
      - REDIS_MAX_CONNECTIONS=15
      - REDIS_USE_SSL=false
      - REDIS_NETWORK_TYPE=tcp

      - SOUMETSU_INTERNAL_AVATARS_PATH=/relesto
      - SOUMETSU_INTERNAL_BANNERS_PATH=/whore

  soumetsu-api:
    image: soumetsu-api:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${SOUMETSU_API_PORT}:${SOUMETSU_API_PORT}"
    environment:
      - APP_COMPONENT=fastapi
      - APP_HTTP_PORT=${SOUMETSU_API_PORT}
      
      - SOUMETSUAPI_STORAGE_PATH=/data

      - SOUMETSU_HCAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - SOUMETSU_HCAPTCHA_ENABLED=true
      
      # MySQL
      - MYSQL_HOST=mysql
      - MYSQL_TCP_PORT=${MYSQL_PORT}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}

      # Redis (assuming standard names or checking config if needed, defaulting to standard)
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DATABASE=${REDIS_DATABASE}

    volumes:
      - "${DATA_BANNERS_PATH}:/data/banners"
      - "${DATA_AVATARS_PATH}:/data/avatars"

  beatmaps-service:
    image: beatmaps-service:latest
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: "curl --fail ${BEATMAPS_SERVICE_INTERNAL_URL}:${BEATMAPS_SERVICE_PORT}/_health"
      interval: 2s
      timeout: 20s
      retries: 10
    ports:
      - "${BEATMAPS_SERVICE_PORT}:${BEATMAPS_SERVICE_PORT}"
    environment:
      - APP_ENV=production
      - ServiceHost=0.0.0.0
      - ServicePort=${BEATMAPS_SERVICE_PORT}
      - ClientId=${OSU_CLIENT_ID}
      - ClientSecret=${OSU_CLIENT_SECRET}
      - RedisConnectionString=redis:${REDIS_PORT}

  donor-bot:
    image: donor-bot:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_COMPONENT=bot
      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}
      - DISCORD_TOKEN=${DISCORD_TOKEN}

      - ROSU_DISCORD_GUILD_ID=${ROSU_DISCORD_GUILD_ID}
      - ROSU_DISCORD_DONOR_ROLE_ID=${ROSU_DISCORD_DONOR_ROLE_ID}
      - ROSU_DISCORD_ADMIN_LOGS_CHANNEL_ID=${ROSU_DISCORD_ADMIN_LOGS_CHANNEL_ID}

      - READ_DB_SCHEME=mysql
      - READ_DB_USER=${MYSQL_USER}
      - READ_DB_PASS=${MYSQL_PASSWORD}
      - READ_DB_HOST=mysql
      - READ_DB_PORT=${MYSQL_PORT}
      - READ_DB_NAME=${MYSQL_DATABASE}
      - READ_DB_USE_SSL=false
      - READ_DB_CA_CERTIFICATE=
      - INITIALLY_AVAILABLE_READ_DB=${MYSQL_DATABASE}

      - DB_POOL_MIN_SIZE=${DB_POOL_MIN_SIZE}
      - DB_POOL_MAX_SIZE=${DB_POOL_MAX_SIZE}

      - DD_AGENT_HOST=host.docker.internal
      - DD_SERVICE=donor-bot
      - DD_ENV=production
      - DD_LOGS_INJECTION=true
      - DD_VERSION=4.0.0
    
  # Daemons
  statistics-service-online-cron:
    image: statistics-service:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - APP_ENV=production
      - APP_COMPONENT=online_cron
      - APP_HOST=0.0.0.0
      - APP_PORT=${STATISTICS_SERVICE_PORT}
      

      - WRITE_DB_HOST=mysql
      - WRITE_DB_PORT=${MYSQL_PORT}
      - WRITE_DB_USER=${MYSQL_USER}
      - WRITE_DB_PASS=${MYSQL_PASSWORD}
      - WRITE_DB_NAME=${MYSQL_DATABASE}

      - READ_DB_HOST=mysql
      - READ_DB_PORT=${MYSQL_PORT}
      - READ_DB_USER=${MYSQL_USER}
      - READ_DB_PASS=${MYSQL_PASSWORD}
      - READ_DB_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - LOG_LEVEL=10
  
  statistics-service-profile-graphs-cron:
    image: statistics-service:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - APP_ENV=production
      - APP_COMPONENT=profile_graphs_cron
      - APP_HOST=0.0.0.0
      - APP_PORT=${STATISTICS_SERVICE_PORT}
      

      - WRITE_DB_HOST=mysql
      - WRITE_DB_PORT=${MYSQL_PORT}
      - WRITE_DB_USER=${MYSQL_USER}
      - WRITE_DB_PASS=${MYSQL_PASSWORD}
      - WRITE_DB_NAME=${MYSQL_DATABASE}

      - READ_DB_HOST=mysql
      - READ_DB_PORT=${MYSQL_PORT}
      - READ_DB_USER=${MYSQL_USER}
      - READ_DB_PASS=${MYSQL_PASSWORD}
      - READ_DB_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - LOG_LEVEL=10

  statistics-service-top-scores-cron:
    image: statistics-service:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      - APP_ENV=production
      - APP_COMPONENT=top_scores_cron
      - APP_HOST=0.0.0.0
      - APP_PORT=${STATISTICS_SERVICE_PORT}
      

      - WRITE_DB_HOST=mysql
      - WRITE_DB_PORT=${MYSQL_PORT}
      - WRITE_DB_USER=${MYSQL_USER}
      - WRITE_DB_PASS=${MYSQL_PASSWORD}
      - WRITE_DB_NAME=${MYSQL_DATABASE}

      - READ_DB_HOST=mysql
      - READ_DB_PORT=${MYSQL_PORT}
      - READ_DB_USER=${MYSQL_USER}
      - READ_DB_PASS=${MYSQL_PASSWORD}
      - READ_DB_NAME=${MYSQL_DATABASE}

      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT}

      - SERVICE_READINESS_TIMEOUT=${SERVICE_READINESS_TIMEOUT}

      - LOG_LEVEL=10

  cron:
    image: rosu-cron:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - FokaKey=abc
      - BanchoApiUrl=${APP_BANCHO_URL}
      - DonorBadgeId=${PS_DONATOR_BADGE_ID}
      - ConnectionStrings__MysqlConnection=Server=mysql;Port=${MYSQL_PORT};Database=${MYSQL_DATABASE};User Id=${MYSQL_USER};Pwd=${MYSQL_PASSWORD}
      - RedisUri=redis:${REDIS_PORT}

  bss:
    image: bss:latest
    restart: always
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=${BSS_PORT}
      
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_HOST=mysql
      - MYSQL_PORT=${MYSQL_PORT}
      - MYSQL_DATABASE=${MYSQL_DATABASE}

    volumes:
      - ${DATA_BSS_PATH}:/data
      - ${DATA_MAPS_PATH}:/maps

  # We don't talk about these.
  crying-sigma:
    image: crying-sigma:latest
    restart: always
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=${CRYING_SIGMA_PORT}
      - APP_DOMAIN=${PS_SERVER_DOMAIN}

    volumes:
      - ${DATA_CRYING_SIGMA_PATH}:/app/sigma/.data

  laughing-sigma:
    image: laughing-sigma:latest
    restart: always
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=${LAUGHING_SIGMA_PORT}
      - APP_DOMAIN=${PS_SERVER_DOMAIN}

    volumes:
      - ${DATA_BSS_PATH}:/data

  bancho:
    image: bancho:latest
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    ports:
      - "${BANCHO_PORT}:${BANCHO_PORT}"
    environment:
      - ConnectionStrings__Default=Server=mysql;Port=${MYSQL_PORT};Database=${MYSQL_DATABASE};User Id=${MYSQL_USER};Pwd=${MYSQL_PASSWORD};
      - Bancho__ServerName=${PS_SERVER_NAME}
      - Bancho__Domain=c.${PS_SERVER_DOMAIN}
      - Bancho__BotUsername=${PS_SERVER_BOT_NAME}
      - Bancho__BotUserId=${PS_SERVER_BOT_USER_ID}
      - Bancho__MinimumClientYear=${PEPPY_MINIMUM_CLIENT_YEAR}
      - Bancho__RedisConnectionString=redis:${REDIS_PORT}
      - Bancho__Ip2LocationApiKey=${IP2LOCATION_API_KEY}
      - Bancho__PerformanceServiceUrl=${PERFORMANCE_SERVICE_INTERNAL_URL}:${PERFORMANCE_SERVICE_PORT}
      - Bancho__UssrUrl=${USSR_INTERNAL_URL}:${USSR_PORT}
      - Bancho__Port=${BANCHO_PORT}
      - Bancho__BindAddress=0.0.0.0
      - "Bancho__DiscordRankedWebhookUrl=${PS_DISCORD_RANKED_WEBHOOK:-}"
      - "Bancho__DiscordAdminWebhookUrl=${PS_DISCORD_ADMIN_WEBHOOK:-}"
